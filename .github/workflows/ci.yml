name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
      - "codex/**"
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_HOME: ${{ github.workspace }}
      TRANSITOPS_JWT_SIGNING_KEY: ci-local-dev-signing-key-0123456789abcdef
      TRANSITOPS_BOOTSTRAP_ADMIN_TOKEN: ci-bootstrap-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore TransitOps.slnx

      - name: Build solution
        run: dotnet build TransitOps.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test TransitOps.Tests/TransitOps.Tests.csproj -c Release --no-build --logger "trx;LogFileName=TransitOps.Tests.trx" --results-directory artifacts/test-results

      - name: Check EF Core model drift
        run: dotnet tool run dotnet-ef migrations has-pending-model-changes --project ./TransitOps.Api/TransitOps.Api.csproj --startup-project ./TransitOps.Api/TransitOps.Api.csproj

      - name: Validate docker compose configuration
        run: docker compose config > /dev/null

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transitops-test-results
          path: artifacts/test-results
          if-no-files-found: ignore
