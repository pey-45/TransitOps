name: terraform-dev

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the generated dev Terraform plan"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_terraform_state_bucket_name: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_terraform_lock_table_name: ${{ vars.TF_LOCK_TABLE }}
      TF_VAR_root_domain: ${{ vars.ROOT_DOMAIN }}
      TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
      TF_VAR_enable_https: ${{ vars.ENABLE_HTTPS || 'false' }}
      TF_VAR_database_username: ${{ vars.DATABASE_USERNAME }}
      TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
      TF_VAR_ecs_desired_count: "0"

    defaults:
      run:
        working-directory: infra/terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/transitops-dev-github-actions-deploy-role
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write backend config
        run: |
          cat > backend.ci.hcl <<EOF
          bucket         = "${{ vars.TF_STATE_BUCKET }}"
          key            = "${{ vars.TF_STATE_KEY }}"
          region         = "${{ vars.AWS_REGION }}"
          dynamodb_table = "${{ vars.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=backend.ci.hcl

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../..

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.apply
        run: terraform apply -auto-approve tfplan
