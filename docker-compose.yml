services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_migrations:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transitops -d transitops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: TransitOps.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=transitops;Username=transitops;Password=transitops_dev
      Jwt__Issuer: TransitOps.Api
      Jwt__Audience: TransitOps.Client
      Jwt__SigningKey: ${TRANSITOPS_JWT_SIGNING_KEY}
      Bootstrap__FirstAdminToken: ${TRANSITOPS_BOOTSTRAP_ADMIN_TOKEN}
      Database__ApplyMigrationsOnStartup: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_migrations:
